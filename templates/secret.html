<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images centrées avec fond</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center; 
            align-items: center;    
        
            background-image: url('/static/1383930.png');
            background-size: cover;      
            background-position: center; 
            background-repeat: no-repeat;
        }

        .container {
            display: flex;
            gap: 20px; 
        }

        img {
            width: 500px;
            height: 700px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<div class="container">
    <img src="/static/image1.png" alt="Image 1">
    <img src="/static/image2.png" alt="Image 2">
    <img src="/static/image3.png" alt="Image 3">
</div>

</body>
</html>
