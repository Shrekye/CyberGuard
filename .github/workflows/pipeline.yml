name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:

  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  flake8-lint:
    name: Flake8 Lint
    runs-on: ubuntu-24.04
    needs: gitleaks
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Create flake8 config
        run: |
          echo "[flake8]" > .flake8
          echo "max-line-length = 120" >> .flake8
          echo "exclude = .git,__pycache__,venv,env" >> .flake8

      - name: Run flake8
        run: flake8 . || true  # ne bloque pas le pipeline sur lint

  bandit-scan:
    name: SAST Bandit
    runs-on: ubuntu-24.04
    needs: flake8-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit scan
        run: bandit -r . -f json -o bandit-report.json

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  pip-audit:
    name: pip-audit security scan
    runs-on: ubuntu-24.04
    needs: bandit-scan
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit
        run: pip-audit
    
  trivy-unprebuild:
    name: Trivy Scan PreBuild
    runs-on: ubuntu-24.04
    needs: pip-audit
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: Shrekye/CyberGuard
          ref: develop

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          path: .

  trivy-postbuild:
    name: Trivy Scan PostBuild Docker Image
    runs-on: ubuntu-24.04
    needs: trivy-unprebuild
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image locally
        run: |
          docker build -t cyberguard-local:${{ github.sha }} .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: cyberguard-local:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
  
  dast_nikto:
    name: DAST Nikto Scan
    runs-on: ubuntu-24.04
#    needs: trivy-postbuild
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker container
        run: |
          docker build -t cyberguard:${{ github.sha }} .

      - name: Run Docker container
        run: |
          docker run -d --name cyberguard-test -p 5000:5000 cyberguard:${{ github.sha }}
          echo "Container started, waiting 3 seconds..."
          sleep 3

      - name: Debug container and network
        run: |
          echo "=== Container status ==="
          docker ps -a | grep cyberguard-test || true
          
          echo "=== Container logs (first 50 lines) ==="
          docker logs cyberguard-test 2>&1 | head -50 || true
          
          echo "=== Container inspect - Network Settings ==="
          docker inspect cyberguard-test | grep -A 20 NetworkSettings || true
          
          echo "=== Get container IP ==="
          CONTAINER_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' cyberguard-test)
          echo "Container IP: $CONTAINER_IP"
          echo "CONTAINER_IP=$CONTAINER_IP" >> $GITHUB_ENV
          
          echo "=== Check if port 5000 is exposed ==="
          docker port cyberguard-test || true
          
          echo "=== Test localhost:5000 ==="
          curl -v http://localhost:5000 2>&1 | head -20 || true
          
          echo "=== Test 127.0.0.1:5000 ==="
          curl -v http://127.0.0.1:5000 2>&1 | head -20 || true
          
          echo "=== Test container IP:5000 ==="
          curl -v http://$CONTAINER_IP:5000 2>&1 | head -20 || true
          
          echo "=== Check if process is running in container ==="
          docker exec cyberguard-test ps aux 2>&1 || echo "ps not available in distroless"
          
          echo "=== Check listening ports in container ==="
          docker exec cyberguard-test netstat -tulpn 2>&1 || \
          docker exec cyberguard-test ss -tulpn 2>&1 || \
          echo "netstat/ss not available in distroless"

      - name: Wait for Flask app to be ready
        run: |
          echo "Container IP from env: $CONTAINER_IP"
          
          # Essayer plusieurs endpoints
          for endpoint in "localhost" "127.0.0.1" "$CONTAINER_IP"; do
            echo "Trying endpoint: $endpoint:5000"
            for i in {1..30}; do
              if curl -s -f http://$endpoint:5000 >/dev/null 2>&1; then
                echo "✅ App is ready on $endpoint:5000!"
                echo "APP_ENDPOINT=$endpoint" >> $GITHUB_ENV
                exit 0
              fi
              echo "Waiting for app on $endpoint:5000... ($i/30)"
              
              # Afficher les logs toutes les 10 tentatives
              if [ $((i % 10)) -eq 0 ]; then
                echo "--- Container logs (attempt $i) ---"
                docker logs cyberguard-test 2>&1 | tail -20 || true
              fi
              
              sleep 2
            done
          done
          
          echo "❌ App failed to start on all endpoints"
          echo "=== Final container logs ==="
          docker logs cyberguard-test 2>&1 || true
          echo "=== Container state ==="
          docker inspect cyberguard-test | grep -A 5 State || true
          exit 1

      - name: Set Nikto target URL
        run: |
          if [ -n "$APP_ENDPOINT" ]; then
            NIKTO_TARGET="http://$APP_ENDPOINT:5000"
          else
            NIKTO_TARGET="http://localhost:5000"
          fi
          echo "NIKTO_TARGET=$NIKTO_TARGET" >> $GITHUB_ENV
          echo "Nikto will scan: $NIKTO_TARGET"

      - name: Install Nikto
        run: sudo apt-get update && sudo apt-get install -y nikto

      - name: Run Nikto scan
        run: |
          echo "Scanning target: $NIKTO_TARGET"
          nikto -h $NIKTO_TARGET -output nikto_report.txt

      - name: Display Nikto report summary
        run: |
          echo "=== Nikto Scan Results ==="
          cat nikto_report.txt

      - name: Upload Nikto report
        uses: actions/upload-artifact@v4
        with:
          name: nikto-report
          path: nikto_report.txt

      - name: Cleanup Docker container
        if: always()
        run: |
          echo "Cleaning up container..."
          docker rm -f cyberguard-test || true
          echo "Cleanup complete"

  dast-zap:
    name: OWASP ZAP Scan
    runs-on: ubuntu-24.04
    needs: trivy-postbuild
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t cyberguard:${{ github.sha }} .

      - name: Run application
        run: |
          docker run -d \
            --name cyberguard-test \
            -p 5000:5000 \
            cyberguard:${{ github.sha }}
          sleep 5

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://127.0.0.1:5000'
          cmd_options: '-a'

      - name: Cleanup Docker container
        if: always()
        run: docker rm -f cyberguard-test
