# .gitleaks.toml
title = "Gitleaks Configuration"

[extend]
# You can extend from the default Gitleaks config
useDefault = true

[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
tags = ["aws", "secret"]

[[rules]]
id = "aws-secret-key"
description = "AWS Secret Key"
regex = '''(?i)aws(.{0,20})?(?-i)['\"][0-9a-zA-Z\/+]{40}['\"]'''
tags = ["aws", "secret"]

[[rules]]
id = "github-token"
description = "GitHub Token"
regex = '''(ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{36}'''
tags = ["github", "token"]

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN (RSA|EC|OPENSSH|DSA) PRIVATE KEY-----'''
tags = ["key", "private"]

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(api[_-]?key|apikey|secret|token)['\"]?\s*[=:]\s*['\"]?[a-f0-9]{16,64}['\"]?'''
tags = ["api", "key"]

[allowlist]
# Files to ignore
files = [
    '''\.lock$''',
    '''\.git/config''',
    '''\.gitattributes''',
    '''\.gitignore''',
    '''go\.sum''',
    '''package-lock\.json''',
    '''yarn\.lock''',
    '''pnpm-lock\.yaml''',
]

# Paths to ignore
paths = [
    '''gitleaks.toml''',
    '''\.git/''',
    '''\.vscode/''',
    '''\.idea/''',
    '''node_modules/''',
    '''venv/''',
    '''\.env\.example''',
]

# Commits to ignore (by SHA)
commits = []

# Regex for matching false positives
regexes = [
    ''''''  # Empty string matches nothing
]