version: "3.9"

services:

  cyberguard:
    build: .
    environment:
      - APP_MODE=dev
      - PORT=5000
    networks:
      - cybernet
    deploy:
      replicas: 2
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 5s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:latest
    ports:
      - "5000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - cybernet
    deploy:
      replicas: 1

networks:
  cybernet: