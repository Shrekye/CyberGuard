version: "3.9"

services:

  cyberguard:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - openbao
    environment:
      - APP_MODE=dev
      - PORT=5000
      - FLASK_DEBUG=1
      - VAULT_ADDR=http://openbao:8200 # nosec
      - VAULT_TOKEN=${VAULT_TOKEN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - SECRET_KEY=${SECRET_KEY}
      

  openbao:
    image: "openbao/openbao:latest"
    container_name: openbao_serv
    restart: always
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_TOKEN}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200 # nosec

    cap_add:
      - IPC_LOCK
    volumes:
      - ./openbao_data:/bao/data


 